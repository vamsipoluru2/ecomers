<div class="container mt-5 col-md-6">
  <div class="card shadow">
    <div class="card-body text-center">
      <h3 class="text-success mb-3">Thank You!</h3>

      <div *ngIf="loading" class="alert alert-info">Processing…</div>
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <ng-container *ngIf="!loading && data">
        <p class="lead mb-1">{{ data.message }}</p>
        <p class="text-muted">Order #{{ data.orderId }}</p>
        <p *ngIf="data.estimatedDelivery" class="mb-4">
          Estimated Delivery: <strong>{{ data.estimatedDelivery }}</strong>
        </p>
        
        <!-- Invoice Download Button -->
        <div class="mb-3">
          <button class="btn btn-success" (click)="downloadInvoice()">
            📄 Download Invoice (PDF)
          </button>
        </div>
        
        <div class="d-flex gap-2 justify-content-center">
          <a class="btn btn-primary" [routerLink]="['/orders']">View Orders</a>
          <a class="btn btn-outline-secondary" [routerLink]="['/products']">Continue Shopping</a>
        </div>
      </ng-container>
    </div>
  </div>
</div>
