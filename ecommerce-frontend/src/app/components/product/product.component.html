<div class="container mt-4">
  <h2 class="text-center mb-4 text-primary">🛒 Available Products</h2>

  <!-- ✅ Search + Filter -->
  <form class="filter-bar" (ngSubmit)="onSearchSubmit()">
    <input
      class="form-control"
      type="text"
      name="keyword"
      placeholder="🔍 Search products..."
      [(ngModel)]="keyword"
    />

    <select class="form-select" name="category" [(ngModel)]="category">
      <option value="">All Categories</option>
      <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
    </select>

    <button type="submit" class="btn btn-primary">Search</button>
  </form>

  <!-- ✅ Product Cards -->
  <div class="row justify-content-center">
    <div class="alert alert-warning text-center w-50" *ngIf="products.length === 0">
      No products found!
    </div>

    <div
      class="col-md-3 mb-4"
      *ngFor="let p of products; trackBy: trackById"
    >
      <div class="card shadow-sm h-100">
        <img
          [src]="imgSrc(p.imageUrl)"
          class="card-img-top"
          height="200"
          style="object-fit: cover"
          alt="Product image"
        />

        <div class="card-body text-center">
          <h5 class="card-title">{{ p.name }}</h5>
          <p class="text-muted mb-1">{{ p.category }}</p>

          <!-- ✅ Product Description -->
          <p class="product-desc small" [title]="p.description">
            {{ truncate(p.description, 60) }}
          </p>

          <p class="price-tag">₹{{ p.price }}</p>
          <button
            type="button"
            class="btn btn-success btn-sm"
            (click)="onAddToCart(p.id, $event)"
          >
            Add to Cart
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ Pagination -->
  <div class="text-center mt-4" *ngIf="totalPages > 1">
    <nav>
      <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="currentPage === 0">
          <button
            class="page-link"
            (click)="prevPage()"
            [disabled]="currentPage === 0"
            type="button"
          >
            Previous
          </button>
        </li>

        <li
          class="page-item"
          *ngFor="let i of pages"
          [class.active]="i === currentPage"
        >
          <button class="page-link" type="button" (click)="gotoPage(i)">
            {{ i + 1 }}
          </button>
        </li>

        <li
          class="page-item"
          [class.disabled]="currentPage + 1 >= totalPages"
        >
          <button
            class="page-link"
            (click)="nextPage()"
            [disabled]="currentPage + 1 >= totalPages"
            type="button"
          >
            Next
          </button>
        </li>
      </ul>
    </nav>
  </div>
</div>
