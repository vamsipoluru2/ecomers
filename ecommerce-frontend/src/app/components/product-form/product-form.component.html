<div class="container mt-4">
  <h2>Add New Product</h2>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" enctype="multipart/form-data">
    <div class="mb-3">
      <label>Name:</label>
      <input type="text" formControlName="name" class="form-control" required />
    </div>

    <div class="mb-3">
      <label>Description:</label>
      <textarea formControlName="description" class="form-control" rows="3" required></textarea>
    </div>

    <div class="mb-3">
      <label>Price:</label>
      <input
        type="number"
        formControlName="price"
        class="form-control"
        step="0.01"
        required
      />
    </div>

    <div class="mb-3">
      <label>Category:</label>
      <input type="text" formControlName="category" class="form-control" required />
    </div>

    <div class="mb-3">
      <label>Image:</label>
      <input
        type="file"
        accept="image/*"
        class="form-control"
        (change)="onFileChange($event)"
        required
      />
    </div>

    <button class="btn btn-primary" type="submit" [disabled]="loading">
      {{ loading ? 'Saving...' : 'Save' }}
    </button>

    <div class="mt-3">
      <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>
      <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>
    </div>
  </form>
</div>
