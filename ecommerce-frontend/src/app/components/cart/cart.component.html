<div class="container mt-5 bg-light pt-1 pb-4">
  <h2 class="text-center text-primary mb-4">🛍️ Your Shopping Cart</h2>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="text-center py-4">
    <p>Loading cart...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !isLoading" class="alert alert-danger text-center">
    {{ error }}
    <a routerLink="/login" class="alert-link" *ngIf="error.includes('log in')">Log In</a>
  </div>

  <!-- Success/Info Message -->
  <div *ngIf="message && !isLoading" class="alert alert-info text-center">
    {{ message }}
  </div>

  <!-- Empty Cart -->
  <div *ngIf="!isLoading && !error && (!cart || cart.length === 0)" class="alert alert-warning text-center">
    Cart is empty!
    <a routerLink="/products" class="alert-link">Shop Now</a>
  </div>

  <ng-container *ngIf="cart && cart.length > 0">
    <table class="table table-bordered text-center align-middle bg-white shadow-sm">
      <thead class="table-dark">
        <tr>
          <th>Image</th>
          <th>Product</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let it of cart">
          <td>
            <img
              [src]="imgSrc(it.product.imageUrl)"
              width="70"
              [alt]="it.product.name"
              class="rounded"
            />
          </td>
          <td>{{ it.product.name }}</td>
          <td>₹{{ it.product.price }}</td>
          <td>
            <form
              class="d-flex justify-content-center"
              (ngSubmit)="$event.preventDefault(); updateQuantity(it, qty.value)"
            >
              <input
                #qty="ngModel"
                type="number"
                name="quantity"
                [ngModel]="it.quantity"
                min="1"
                class="form-control w-50 text-center"
              />
              <button class="btn btn-sm btn-outline-primary ms-2" type="submit">Update</button>
            </form>
          </td>
          <td>₹{{ it.totalPrice ?? lineTotal(it) }}</td>
          <td>
            <button class="btn btn-sm btn-danger" type="button" (click)="removeItem(it)">
              Remove
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <h4 class="text-end">Total: ₹{{ total }}</h4>

    <div class="text-end d-flex gap-2 justify-content-end">
      <button class="btn btn-outline-danger" type="button" (click)="clearCart()">Clear Cart</button>
      <!-- ✅ Proceed to unified checkout page -->
      <a routerLink="/checkout" class="btn btn-success">Checkout</a>
    </div>
  </ng-container>
</div>
