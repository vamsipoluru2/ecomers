<div class="container mt-4">
  <h2>Product List</h2>

  <div class="mb-3">
    <a class="btn btn-success" [routerLink]="['/admin/products/add']">+ Add Product</a>
  </div>

  <div *ngIf="loading" class="alert alert-info">Loading…</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <table class="table table-bordered" *ngIf="!loading && products.length > 0">
    <thead class="table-dark">
      <tr>
        <th>ID</th><th>Name</th><th>Description</th>
        <th>Price</th><th>Category</th><th>Image</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of products; trackBy: trackById">
        <td>{{ p.id }}</td>
        <td class="fw-medium">{{ p.name }}</td>
        <td class="text-muted small">{{ p.description }}</td>
        <td>₹{{ p.price }}</td>
        <td>{{ p.category }}</td>
        <td>
          <img [src]="imgSrc(p.imageUrl)" width="80" height="80" alt="Image" class="object-cover rounded" />
        </td>
        <td class="d-flex gap-2">
          <a class="btn btn-primary btn-sm" [routerLink]="['/admin/products/edit', p.id]">Edit</a>
          <button class="btn btn-danger btn-sm" (click)="confirmAndDelete(p.id)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="!loading && products.length === 0" class="alert alert-warning">
    No products found.
  </div>
</div>
