<div class="container py-4">
  <h2 class="mb-4">Checkout</h2>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-3">Processing your order...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error && !isLoading" class="alert alert-danger" role="alert">
    {{ error }}
    <a routerLink="/products" class="alert-link ms-2" *ngIf="error.includes('empty')">Shop Now</a>
  </div>

  <!-- Checkout Form -->
  <div *ngIf="!isLoading && !error" class="row g-4">
    <!-- Billing and Payment Form -->
    <div class="col-md-7">
      <form (ngSubmit)="placeOrder()" #checkoutForm="ngForm">
        <!-- Billing Address Section -->
        <h5 class="mt-3 mb-3">Billing Address</h5>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Full Name <span class="text-danger">*</span></label>
            <input
              type="text"
              name="fullName"
              class="form-control"
              [(ngModel)]="billing.fullName"
              required
            />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Email <span class="text-danger">*</span></label>
            <input
              type="email"
              name="email"
              class="form-control"
              [(ngModel)]="billing.email"
              required
            />
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Contact Number <span class="text-danger">*</span></label>
            <input
              type="tel"
              name="contactNumber"
              class="form-control"
              [(ngModel)]="billing.contactNumber"
              required
            />
          </div>
          <div class="col-12 mb-3">
            <label class="form-label">Address Line 1 <span class="text-danger">*</span></label>
            <input
              type="text"
              name="addressLine1"
              class="form-control"
              [(ngModel)]="billing.addressLine1"
              required
            />
          </div>
          <div class="col-12 mb-3">
            <label class="form-label">Address Line 2</label>
            <input
              type="text"
              name="addressLine2"
              class="form-control"
              [(ngModel)]="billing.addressLine2"
            />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">City <span class="text-danger">*</span></label>
            <input
              type="text"
              name="city"
              class="form-control"
              [(ngModel)]="billing.city"
              required
            />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">State <span class="text-danger">*</span></label>
            <input
              type="text"
              name="state"
              class="form-control"
              [(ngModel)]="billing.state"
              required
            />
          </div>
          <div class="col-md-4 mb-3">
            <label class="form-label">PIN Code <span class="text-danger">*</span></label>
            <input
              type="text"
              name="postalCode"
              class="form-control"
              [(ngModel)]="billing.postalCode"
              required
            />
          </div>
        </div>

        <!-- Payment Method Section -->
        <h5 class="mt-4 mb-3">Payment Method</h5>
        <div class="mb-3">
          <select
            name="paymentMethod"
            class="form-select"
            [(ngModel)]="paymentMethod"
            (change)="onPaymentMethodChange()"
            required
          >
            <option *ngFor="let method of paymentMethods" [value]="method">
              {{ method }}
            </option>
          </select>
        </div>

        <!-- UPI Fields -->
        <div *ngIf="showUpiFields" class="mb-3">
          <label class="form-label">UPI ID <span class="text-danger">*</span></label>
          <input
            type="text"
            name="upiId"
            class="form-control"
            [(ngModel)]="upiId"
            placeholder="name@bank"
            [required]="paymentMethod === 'UPI'"
          />
        </div>

        <!-- Card Fields -->
        <div *ngIf="showCardFields" class="mb-3">
          <div class="row">
            <div class="col-12 mb-3">
              <label class="form-label">Card Holder Name <span class="text-danger">*</span></label>
              <input
                type="text"
                name="cardHolder"
                class="form-control"
                [(ngModel)]="cardHolder"
                [required]="paymentMethod === 'CARD'"
              />
            </div>
            <div class="col-12 mb-3">
              <label class="form-label">Card Number <span class="text-danger">*</span></label>
              <input
                type="text"
                name="cardNumber"
                class="form-control"
                [(ngModel)]="cardNumber"
                placeholder="1234 5678 9012 3456"
                [required]="paymentMethod === 'CARD'"
              />
            </div>
            <div class="col-6 mb-3">
              <label class="form-label">Expiry (MM/YY) <span class="text-danger">*</span></label>
              <input
                type="text"
                name="expiry"
                class="form-control"
                [(ngModel)]="expiry"
                placeholder="MM/YY"
                [required]="paymentMethod === 'CARD'"
              />
            </div>
            <div class="col-6 mb-3">
              <label class="form-label">CVV <span class="text-danger">*</span></label>
              <input
                type="text"
                name="cvv"
                class="form-control"
                [(ngModel)]="cvv"
                placeholder="123"
                maxlength="3"
                [required]="paymentMethod === 'CARD'"
              />
            </div>
          </div>
        </div>

        <button
          type="submit"
          class="btn btn-primary mt-2"
          [disabled]="isLoading || checkoutForm.invalid"
        >
          <span *ngIf="!isLoading">Place Order</span>
          <span *ngIf="isLoading">
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
            Processing...
          </span>
        </button>
      </form>
    </div>

    <!-- Cart Summary -->
    <div class="col-md-5">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Your Cart</h5>
        </div>
        <ul class="list-group list-group-flush">
          <li
            *ngFor="let item of cartItems"
            class="list-group-item d-flex justify-content-between align-items-center"
          >
            <div>
              <span class="fw-bold">{{ item.product.name }}</span>
              <br />
              <small class="text-muted">× {{ item.quantity }}</small>
            </div>
            <span class="fw-bold">₹{{ getLineTotal(item) }}</span>
          </li>
          <li class="list-group-item d-flex justify-content-between">
            <strong>Total</strong>
            <strong class="text-primary">₹{{ total }}</strong>
          </li>
        </ul>
      </div>
    </div>
  </div>
</div>
